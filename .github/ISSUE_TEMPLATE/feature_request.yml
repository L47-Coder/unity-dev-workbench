name: Feature request
description: Suggest a new capability or an improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or the use case that is currently hard to express with Dev Workbench.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How would you like this to work? Feel free to sketch an API,
        describe a UI, or reference prior art from other packages.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other approaches you've thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, anything else that helps.
